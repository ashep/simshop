services:
  tests:
    image: golang:1.26-alpine3.23
    volumes:
      - type: bind
        source: ./
        target: /src
    working_dir: /src
    environment:
      APP_DB_DSN: "postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s
