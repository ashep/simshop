openapi: "3.0.0"

info:
  title: SimShop API
  version: "0.2.0"

paths:
  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of all products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProductsResponse'

components:
  schemas:
    ProductDataItem:
      type: object
      required:
        - title
        - description
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1

    GetProductResponse:
      type: object
      required:
        - id
        - data
      properties:
        id:
          type: string
          format: uuid
        data:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ProductDataItem'

    ListProductsResponse:
      type: array
      items:
        $ref: '#/components/schemas/GetProductResponse'

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
