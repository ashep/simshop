components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Shop:
      type: object
      required:
        - id
        - names
      properties:
        id:
          type: string
          minLength: 3
          maxLength: 16
        names:
          type: object
          required:
            - en
          additionalProperties:
            type: string
            minLength: 3
            maxLength: 100
        owner_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ListShopsResponse:
      type: array
      items:
        $ref: "#/components/schemas/Shop"

    GetShopResponse:
      $ref: "#/components/schemas/Shop"

    CreateShopRequest:
      $ref: "#/components/schemas/Shop"

    UpdateShopRequest:
      type: object
      properties:
        names:
          type: object
          additionalProperties:
            type: string
            minLength: 3
            maxLength: 100

    CreateProductRequest:
      type: object
      required:
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 5

    CreateProductResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
