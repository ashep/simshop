components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    ShopCreateRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          minLength: 3
          maxLength: 16

    ShopCreateResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string

    ProductCreateRequest:
      type: object
      required:
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 5

    ProductCreateResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
