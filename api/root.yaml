openapi: "3.1.0"

info:
  title: SimShop API
  version: "0.1.0"

paths:
  /shops:
    post:
      operationId: createShop
      security:
        - ApiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShopCreateRequest'
      responses:
        "201":
          description: Shop created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopCreateResponse'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


