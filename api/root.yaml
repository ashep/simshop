openapi: "3.0.0"

info:
  title: SimShop API
  version: "0.5.0"

paths:
  /shop:
    get:
      operationId: getShop
      responses:
        "200":
          description: Shop metadata (all language variants)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopResponse'

  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of all products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductItem'

  /products/{id}/{lang}:
    get:
      operationId: getProductContent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail in the requested language
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductResponse'
        "404":
          description: Product or language not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pages:
    get:
      operationId: listPages
      responses:
        "200":
          description: List of pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PageItem'

  /pages/{id}/{lang}:
    get:
      operationId: getPage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Page content in the requested language
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Page or language not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SpecItem:
      type: object
      required:
        - title
        - value
      properties:
        title:
          type: string
        value:
          type: string

    PriceItem:
      type: object
      required:
        - currency
        - value
      properties:
        currency:
          type: string
        value:
          type: number

    AttrValue:
      type: object
      required:
        - title
        - add_price
      properties:
        title:
          type: string
        add_price:
          type: number

    AttrLang:
      type: object
      required:
        - title
        - values
      properties:
        title:
          type: string
        values:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttrValue'

    ImageItem:
      type: object
      required:
        - preview
        - full
      properties:
        preview:
          type: string
        full:
          type: string

    GetProductResponse:
      type: object
      required:
        - id
        - name
        - description
        - price
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        specs:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/SpecItem'
        price:
          $ref: '#/components/schemas/PriceItem'
        attrs:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/AttrLang'
        images:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ImageItem'

    ProductItem:
      type: object
      required:
        - id
        - title
        - description
      properties:
        id:
          type: string
        title:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          additionalProperties:
            type: string
        image:
          type: string
          nullable: true

    PageItem:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
        title:
          type: object
          additionalProperties:
            type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    ShopResponse:
      type: object
      properties:
        name:
          type: object
          additionalProperties:
            type: string
        title:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          additionalProperties:
            type: string
