openapi: "3.0.0"

info:
  title: SimShop API
  version: "0.5.0"

paths:
  /shop:
    get:
      operationId: getShop
      responses:
        "200":
          description: Shop metadata (all language variants)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopResponse'

  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of all products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductItem'

  /products/{id}/{lang}:
    get:
      operationId: getProductContent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail in the requested language
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductResponse'
        "404":
          description: Product or language not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pages:
    get:
      operationId: listPages
      responses:
        "200":
          description: List of pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PageItem'

  /pages/{id}/{lang}:
    get:
      operationId: getPage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Page content in the requested language
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Page or language not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /nova-poshta/cities:
    get:
      operationId: searchNovaPoshtaCities
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NovaPoshtaCityItem'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Nova Poshta API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /nova-poshta/streets:
    get:
      operationId: searchNovaPoshtaStreets
      parameters:
        - name: city_ref
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching streets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NovaPoshtaStreetItem'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Nova Poshta API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /nova-poshta/branches:
    get:
      operationId: searchNovaPoshtaBranches
      parameters:
        - name: city_ref
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NovaPoshtaBranchItem'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Nova Poshta API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders:
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        "201":
          description: Order created successfully
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Google Sheets API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SpecItem:
      type: object
      required:
        - title
        - value
      properties:
        title:
          type: string
        value:
          type: string

    PriceItem:
      type: object
      required:
        - currency
        - value
      properties:
        currency:
          type: string
        value:
          type: number

    AttrValue:
      type: object
      required:
        - title
      properties:
        title:
          type: string

    AttrLang:
      type: object
      required:
        - title
        - values
      properties:
        title:
          type: string
        values:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttrValue'

    ImageItem:
      type: object
      required:
        - preview
        - full
      properties:
        preview:
          type: string
        full:
          type: string

    GetProductResponse:
      type: object
      required:
        - id
        - name
        - description
        - price
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        specs:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/SpecItem'
        price:
          $ref: '#/components/schemas/PriceItem'
        attrs:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/AttrLang'
        attr_prices:
          type: object
          nullable: true
          additionalProperties:
            type: object
            additionalProperties:
              type: number
        images:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ImageItem'

    ProductItem:
      type: object
      required:
        - id
        - title
        - description
      properties:
        id:
          type: string
        title:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          additionalProperties:
            type: string
        image:
          type: string
          nullable: true

    PageItem:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
        title:
          type: object
          additionalProperties:
            type: string

    CreateOrderRequest:
      type: object
      required:
        - product_id
        - lang
        - first_name
        - last_name
        - phone
        - email
        - city
        - address
      properties:
        product_id:
          type: string
        lang:
          type: string
        attributes:
          type: object
          nullable: true
          additionalProperties:
            type: string
        first_name:
          type: string
        middle_name:
          type: string
          nullable: true
        last_name:
          type: string
        phone:
          type: string
        email:
          type: string
        city:
          type: string
        address:
          type: string
        notes:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    ShopResponse:
      type: object
      properties:
        name:
          type: object
          additionalProperties:
            type: string
        title:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          additionalProperties:
            type: string

    NovaPoshtaCityItem:
      type: object
      required:
        - ref
        - name
      properties:
        ref:
          type: string
        name:
          type: string

    NovaPoshtaBranchItem:
      type: object
      required:
        - ref
        - name
      properties:
        ref:
          type: string
        name:
          type: string

    NovaPoshtaStreetItem:
      type: object
      required:
        - ref
        - name
      properties:
        ref:
          type: string
        name:
          type: string
