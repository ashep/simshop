openapi: "3.0.0"

info:
  title: SimShop API
  version: "0.2.0"

paths:
  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of all products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProductsResponse'

  /products/{id}:
    get:
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Get request successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}/prices:
    get:
      operationId: getProductPrice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: country
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Resolved price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductPriceResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}/files:
    get:
      operationId: getProductFiles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of product files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductFilesResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /properties:
    get:
      operationId: listProperties
      responses:
        "200":
          description: List request successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPropertiesResponse'

components:
  schemas:
    ProductDataItem:
      type: object
      required:
        - title
        - description
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1

    GetProductResponse:
      type: object
      required:
        - id
        - data
      properties:
        id:
          type: string
          format: uuid
        data:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ProductDataItem'

    ListProductsResponse:
      type: array
      items:
        $ref: '#/components/schemas/GetProductResponse'

    GetProductPriceResponse:
      type: object
      required:
        - country_id
        - value
      properties:
        country_id:
          type: string
        value:
          type: integer
          minimum: 0

    ProductFileItem:
      type: object
      required:
        - name
        - mime_type
        - size_bytes
        - path
      properties:
        name:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        path:
          type: string

    GetProductFilesResponse:
      type: array
      items:
        $ref: '#/components/schemas/ProductFileItem'

    Property:
      type: object
      required:
        - id
        - titles
      properties:
        id:
          type: string
          format: uuid
        titles:
          type: object
          minProperties: 1
          additionalProperties:
            type: string
            minLength: 1
            maxLength: 100

    ListPropertiesResponse:
      type: array
      items:
        $ref: '#/components/schemas/Property'

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
