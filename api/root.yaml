openapi: "3.0.0"

info:
  title: SimShop API
  version: "0.4.0"

paths:
  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of all products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductItem'

  /products/{id}/{lang}:
    get:
      operationId: getProductContent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product content in the requested language
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Product or language not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pages:
    get:
      operationId: listPages
      responses:
        "200":
          description: List of pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PageItem'

  /pages/{id}/{lang}:
    get:
      operationId: getPage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Page content in the requested language
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Page or language not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ProductItem:
      type: object
      required:
        - id
        - title
        - description
      properties:
        id:
          type: string
        title:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          additionalProperties:
            type: string

    PageItem:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
        title:
          type: object
          additionalProperties:
            type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
