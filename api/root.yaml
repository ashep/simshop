openapi: "3.0.0"

info:
  title: SimShop API
  version: "0.5.0"

paths:
  /shop:
    get:
      operationId: getShop
      responses:
        "200":
          description: Shop metadata (all language variants)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopResponse'

  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of all products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductItem'

  /products/{id}/{lang}:
    get:
      operationId: getProductContent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail in the requested language
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductResponse'
        "404":
          description: Product or language not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pages:
    get:
      operationId: listPages
      responses:
        "200":
          description: List of pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PageItem'

  /pages/{id}/{lang}:
    get:
      operationId: getPage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Page content in the requested language
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Page or language not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /nova-poshta/cities:
    get:
      operationId: searchNovaPoshtaCities
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NovaPoshtaCityItem'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Nova Poshta API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /nova-poshta/streets:
    get:
      operationId: searchNovaPoshtaStreets
      parameters:
        - name: city_ref
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching streets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NovaPoshtaStreetItem'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Nova Poshta API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /nova-poshta/branches:
    get:
      operationId: searchNovaPoshtaBranches
      parameters:
        - name: city_ref
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NovaPoshtaBranchItem'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Nova Poshta API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /monobank/webhook:
    post:
      operationId: monobankWebhook
      description: |
        Receives Monobank invoice-status webhook deliveries. Authenticated
        via ECDSA signature in the X-Sign header. Not intended for direct
        external calls — handler bypasses the OpenAPI validator.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Processed, idempotent, informational, or unknown reference
        "400":
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Invalid X-Sign signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders:
    get:
      operationId: listOrders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All orders, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderRecord'
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Google Sheets API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{id}:
    get:
      operationId: getOrderStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatusResponse'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    SpecItem:
      type: object
      required:
        - title
        - value
      properties:
        title:
          type: string
        value:
          type: string

    PriceItem:
      type: object
      required:
        - currency
        - value
      properties:
        currency:
          type: string
        value:
          type: number

    AttrValue:
      type: object
      required:
        - title
      properties:
        title:
          type: string

    AttrLang:
      type: object
      required:
        - title
        - values
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        values:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttrValue'

    ImageItem:
      type: object
      required:
        - preview
        - full
      properties:
        preview:
          type: string
        full:
          type: string

    GetProductResponse:
      type: object
      required:
        - id
        - name
        - description
        - price
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        specs:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/SpecItem'
        price:
          $ref: '#/components/schemas/PriceItem'
        attrs:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/AttrLang'
        attr_prices:
          type: object
          nullable: true
          additionalProperties:
            type: object
            additionalProperties:
              type: number
        attr_images:
          type: object
          nullable: true
          additionalProperties:
            type: object
            additionalProperties:
              type: string
        attr_values_order:
          type: object
          nullable: true
          additionalProperties:
            type: array
            items:
              type: string
        images:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ImageItem'

    ProductItem:
      type: object
      required:
        - id
        - title
        - description
      properties:
        id:
          type: string
        title:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          additionalProperties:
            type: string
        image:
          type: string
          nullable: true

    PageItem:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
        title:
          type: object
          additionalProperties:
            type: string

    CreateOrderRequest:
      type: object
      required:
        - product_id
        - lang
        - first_name
        - last_name
        - phone
        - email
        - country
        - city
        - address
      properties:
        product_id:
          type: string
        lang:
          type: string
        attributes:
          type: object
          nullable: true
          additionalProperties:
            type: string
        first_name:
          type: string
        middle_name:
          type: string
          nullable: true
        last_name:
          type: string
        phone:
          type: string
        email:
          type: string
        country:
          type: string
        city:
          type: string
        address:
          type: string
        notes:
          type: string
          nullable: true

    CreateOrderResponse:
      type: object
      required:
        - payment_url
      properties:
        payment_url:
          type: string

    OrderStatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    ShopResponse:
      type: object
      properties:
        countries:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ShopCountry'
        name:
          type: object
          additionalProperties:
            type: string
        title:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          additionalProperties:
            type: string

    ShopCountry:
      type: object
      properties:
        name:
          type: object
          additionalProperties:
            type: string
        currency:
          type: object
          additionalProperties:
            type: string
        phone_code:
          type: string
        flag:
          type: string

    NovaPoshtaCityItem:
      type: object
      required:
        - ref
        - name
      properties:
        ref:
          type: string
        name:
          type: string

    NovaPoshtaBranchItem:
      type: object
      required:
        - ref
        - name
      properties:
        ref:
          type: string
        name:
          type: string

    NovaPoshtaStreetItem:
      type: object
      required:
        - ref
        - name
      properties:
        ref:
          type: string
        name:
          type: string

    OrderAttr:
      type: object
      required: [name, value, price]
      properties:
        name:
          type: string
        value:
          type: string
        price:
          type: integer

    OrderHistoryEntry:
      type: object
      required: [id, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        note:
          type: string
          nullable: true
        payload:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    OrderInvoice:
      type: object
      required:
        - provider
        - id
        - page_url
        - amount
        - currency
      properties:
        provider:
          type: string
        id:
          type: string
        page_url:
          type: string
        amount:
          type: integer
        currency:
          type: string

    OrderRecord:
      type: object
      required:
        - id
        - product_id
        - status
        - email
        - price
        - currency
        - first_name
        - last_name
        - country
        - city
        - phone
        - address
        - created_at
        - updated_at
        - attrs
        - history
        - invoices
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
        status:
          type: string
        email:
          type: string
        price:
          type: integer
        currency:
          type: string
        first_name:
          type: string
        middle_name:
          type: string
          nullable: true
        last_name:
          type: string
        country:
          type: string
        city:
          type: string
        phone:
          type: string
        address:
          type: string
        admin_note:
          type: string
          nullable: true
        customer_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        attrs:
          type: array
          items:
            $ref: '#/components/schemas/OrderAttr'
        history:
          type: array
          items:
            $ref: '#/components/schemas/OrderHistoryEntry'
        invoices:
          type: array
          items:
            $ref: '#/components/schemas/OrderInvoice'
