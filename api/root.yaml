openapi: "3.0.0"

info:
  title: SimShop API
  version: "0.3.0"

paths:
  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of all products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProductsResponse'

components:
  schemas:
    SpecItem:
      type: object
      required:
        - title
        - value
      properties:
        title:
          type: string
        value:
          type: string

    PriceItem:
      type: object
      required:
        - currency
        - value
      properties:
        currency:
          type: string
        value:
          type: number

    AttrValue:
      type: object
      required:
        - title
        - add_price
      properties:
        title:
          type: string
        add_price:
          type: number

    AttrLang:
      type: object
      required:
        - title
        - values
      properties:
        title:
          type: string
        values:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttrValue'

    ImageItem:
      type: object
      required:
        - preview
        - full
      properties:
        preview:
          type: string
        full:
          type: string

    GetProductResponse:
      type: object
      required:
        - id
        - name
        - description
        - price
      properties:
        id:
          type: string
        name:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          additionalProperties:
            type: string
        specs:
          type: object
          nullable: true
          additionalProperties:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/SpecItem'
        price:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PriceItem'
        attrs:
          type: object
          nullable: true
          additionalProperties:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/AttrLang'
        images:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ImageItem'

    ListProductsResponse:
      type: array
      items:
        $ref: '#/components/schemas/GetProductResponse'

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
